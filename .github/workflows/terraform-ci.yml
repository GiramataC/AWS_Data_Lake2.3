name: Terraform CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  TF_VERSION: "1.15.7"
  AWS_REGION: "eu-west-1"
  # Not a secret: an IAM role ARN only identifies who may *ask* to assume
  # it - the trust policy (scoped to this exact repo/ref) is what actually
  # gates access, same as the account ID already present in this repo's
  # committed S3 backend config.
  DEPLOY_ROLE_ARN: "arn:aws:iam::463470950988:role/GitHubActions-DataLakeDeployRole"

jobs:
  fmt-validate:
    name: Format & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt (check only)
        run: terraform fmt -check -recursive -diff

      - name: Terraform init (no backend, no AWS access)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  lint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          # Pinned, not "latest": tflint >=~0.60 has a reproducible crash
          # (nil pointer in its sigstore plugin-signature verification,
          # confirmed on both Linux and Windows locally) when installing
          # the aws ruleset plugin. 0.58.0 is the newest version confirmed
          # to install and run it cleanly.
          tflint_version: v0.58.0

      - name: Run TFLint
        run: |
          tflint --init
          tflint -f compact

  security-scan:
    name: tfsec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ----------------------------------------------------------
  # Plan - runs on every PR and on push to main. Uses the OIDC role in
  # read/plan capacity; the role's trust policy separately allows this via
  # the "pull_request" and "ref:refs/heads/main" subject claims.
  # ----------------------------------------------------------
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [fmt-validate, lint, security-scan]
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        id: plan
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            tfplan
            plan_output.txt
          retention-days: 7

      - name: Post plan summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.slice(0, 60000) + '\n\n... (truncated)'
              : planOutput;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ----------------------------------------------------------
  # Apply - push to main only, held behind the "production" GitHub
  # Environment. Configure a required reviewer on that environment in repo
  # Settings -> Environments, or this job runs unattended.
  # ----------------------------------------------------------
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Show outputs
        run: terraform output -json
